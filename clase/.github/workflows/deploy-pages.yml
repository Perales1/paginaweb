name: Build and deploy to gh-pages branch

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build --if-present

      # Configure Pages to accept a build artifact from this workflow
      - name: Configure Pages
        uses: actions/configure-pages@v3

      # Upload the built static output as an artifact for Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./dist

      # Deploy to GitHub Pages (serves the uploaded artifact)
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v1

